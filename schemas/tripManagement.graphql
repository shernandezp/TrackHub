schema {
  query: Query
  mutation: Mutation
}

type Query {
  tollStations(query: GetTollStationsQueryInput!): TollStationsPageVm!
    @cost(weight: "10")
  tollStationDetail(query: GetTollStationDetailQueryInput!): TollStationDetailVm!
    @cost(weight: "10")
  tollVehicleClasses: [TollVehicleClassVm!]! @cost(weight: "10")
  transporterTollClasses: [TransporterTollClassVm!]! @cost(weight: "10")
  estimateTolls(query: EstimateTollsQueryInput!): TollEstimateVm!
    @cost(weight: "10")
  trips(query: GetTripsQueryInput!): TripsPageVm! @cost(weight: "10")
  tripDetail(query: GetTripDetailQueryInput!): TripDetailVm! @cost(weight: "10")
  activeTrips: [TripVm!]! @cost(weight: "10")
  tripTimeline(query: GetTripTimelineQueryInput!): TripTimelinePageVm!
    @cost(weight: "10")
  tripRouteReplay(query: GetTripRouteReplayQueryInput!): RouteReplayVm!
    @cost(weight: "10")
  tripReportData(query: GetTripReportDataQueryInput!): TripReportPageVm!
    @cost(weight: "10")
  tripStopReportData(query: GetTripStopReportDataQueryInput!): TripStopReportPageVm!
    @cost(weight: "10")
  tripTollReportData(query: GetTripTollReportDataQueryInput!): TripTollReportPageVm!
    @cost(weight: "10")
  tripPodReportData(query: GetTripPodReportDataQueryInput!): TripPodReportPageVm!
    @cost(weight: "10")
}

type Mutation {
  createDelivery(command: CreateDeliveryCommandInput!): DeliveryVm!
    @cost(weight: "10")
  updateDelivery(command: UpdateDeliveryCommandInput!): Boolean!
    @cost(weight: "10")
  updateDeliveryOutcome(command: UpdateDeliveryOutcomeCommandInput!): Boolean!
    @cost(weight: "10")
  deleteDelivery(id: UUID!): UUID! @cost(weight: "10")
  recordProofOfDelivery(command: RecordProofOfDeliveryCommandInput!): ProofOfDeliveryVm!
    @cost(weight: "10")
  createTollVehicleClass(command: CreateTollVehicleClassCommandInput!): TollVehicleClassVm!
    @cost(weight: "10")
  updateTollVehicleClass(command: UpdateTollVehicleClassCommandInput!): Boolean!
    @cost(weight: "10")
  deactivateTollVehicleClass(id: UUID!): UUID! @cost(weight: "10")
  createTollStation(command: CreateTollStationCommandInput!): TollStationVm!
    @cost(weight: "10")
  updateTollStation(command: UpdateTollStationCommandInput!): Boolean!
    @cost(weight: "10")
  deactivateTollStation(id: UUID!): UUID! @cost(weight: "10")
  createTollTariff(command: CreateTollTariffCommandInput!): TollTariffVm!
    @cost(weight: "10")
  updateTollTariff(command: UpdateTollTariffCommandInput!): Boolean!
    @cost(weight: "10")
  deleteTollTariff(id: UUID!): UUID! @cost(weight: "10")
  importTollCatalog(command: ImportTollCatalogCommandInput!): TollCatalogImportResultVm!
    @cost(weight: "10")
  setTransporterTollClass(command: SetTransporterTollClassCommandInput!): TransporterTollClassVm!
    @cost(weight: "10")
  createTrip(command: CreateTripCommandInput!): TripVm! @cost(weight: "10")
  updateTrip(command: UpdateTripCommandInput!): Boolean! @cost(weight: "10")
  deleteTrip(id: UUID!): UUID! @cost(weight: "10")
  assignTrip(command: AssignTripCommandInput!): TripAssignmentVm!
    @cost(weight: "10")
  planTripRoute(command: PlanTripRouteCommandInput!): RoutePlanVm!
    @cost(weight: "10")
  startTrip(id: UUID!): Boolean! @cost(weight: "10")
  pauseTrip(id: UUID!): Boolean! @cost(weight: "10")
  resumeTrip(id: UUID!): Boolean! @cost(weight: "10")
  completeTrip(command: CompleteTripCommandInput!): Boolean! @cost(weight: "10")
  cancelTrip(command: CancelTripCommandInput!): Boolean! @cost(weight: "10")
  abortTrip(command: AbortTripCommandInput!): Boolean! @cost(weight: "10")
  shareTrip(command: ShareTripCommandInput!): TripShareVm! @cost(weight: "10")
  revokeTripShare(command: RevokeTripShareCommandInput!): UUID!
    @cost(weight: "10")
  addTripStop(command: AddTripStopCommandInput!): TripStopVm!
    @cost(weight: "10")
  updateTripStop(command: UpdateTripStopCommandInput!): Boolean!
    @cost(weight: "10")
  removeTripStop(id: UUID!): UUID! @cost(weight: "10")
  reorderTripStops(command: ReorderTripStopsCommandInput!): Boolean!
    @cost(weight: "10")
  recordStopArrival(command: RecordStopArrivalCommandInput!): Boolean!
    @cost(weight: "10")
  recordStopDeparture(command: RecordStopDepartureCommandInput!): Boolean!
    @cost(weight: "10")
  skipStop(command: SkipStopCommandInput!): Boolean! @cost(weight: "10")
  processTripPositions(command: ProcessTripPositionsCommandInput!): TripProcessingResultVm!
    @cost(weight: "10")
  importTrips(command: ImportTripsCommandInput!): [TripImportResultVm!]!
    @cost(weight: "10")
  updateTripStatus(command: UpdateTripStatusCommandInput!): [TripImportResultVm!]!
    @cost(weight: "10")
}

type CoordinateVm {
  latitude: Float!
  longitude: Float!
}

type DeliveryVm {
