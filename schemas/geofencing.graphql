schema {
  query: Query
  mutation: Mutation
}

type Query {
  geofenceEvents(query: GetGeofenceEventsQueryInput!): GeofenceEventsPageVm!
    @cost(weight: "10")
  geofence(query: GetGeofenceQueryInput!): GeofenceVm! @cost(weight: "10")
  geofencesByAccount(query: GetGeofencesByAccountQueryInput!): GeofencesPageVm!
    @cost(weight: "10")
  transportersInGeofence(geofenceId: UUID, type: Short): [TransporterInGeofenceVm!]!
    @cost(weight: "10")
}

type Mutation {
  processPositions(command: ProcessPositionsCommandInput!): GeofenceProcessingResultVm!
    @cost(weight: "10")
  createGeofence(command: CreateGeofenceCommandInput!): GeofenceVm!
    @cost(weight: "10")
  updateGeofence(id: UUID!, command: UpdateGeofenceCommandInput!): Boolean!
    @cost(weight: "10")
  deleteGeofence(id: UUID!): UUID! @cost(weight: "10")
}

type CoordinateVm {
  latitude: Float!
  longitude: Float!
}

type GeofenceEventReportVm {
  geofenceEventId: UUID!
  transporterId: UUID!
  geofenceId: UUID!
  transporterName: String!
  geofenceName: String!
  datetimeIn: DateTime!
  datetimeOut: DateTime
  totalTime: String!
  dwellSeconds: Long
  latitude: Float!
  longitude: Float!
}

type GeofenceEventsPageVm {
  items: [GeofenceEventReportVm!]!
  totalCount: Int!
}

type GeofenceProcessingResultVm {
  processedCount: Int!
  eventsCreated: Int!
  eventsUpdated: Int!
}

type GeofencesPageVm {
  items: [GeofenceVm!]!
  totalCount: Int!
}

type GeofenceVm {
  geofenceId: UUID!
  accountId: UUID!
  geom: MultiPolygonVm!
  name: String!
  description: String
  color: Short!
  type: Short!
  active: Boolean!
  circleCenter: CoordinateVm
  circleRadiusMeters: Float
  alertOnEntry: Boolean!
  alertOnExit: Boolean!
  dwellThresholdMinutes: Int
}

type MultiPolygonVm {
  coordinates: [CoordinateVm!]!
  srid: Int!
}

type TransporterInGeofenceVm {
  transporterId: UUID!
  transporterName: String!
  geofenceId: UUID!
  geofenceName: String!
}

input CoordinateVmInput {
  latitude: Float!
  longitude: Float!
}

input CreateGeofenceCommandInput {
  geofence: GeofenceDtoInput!
}

input GeofenceDtoInput {
  geofenceId: UUID!
  geom: MultiPolygonVmInput
  name: String!
  description: String
  color: Short!
  type: Short!
  active: Boolean!
  circleCenter: CoordinateVmInput
  circleRadiusMeters: Float
  alertOnEntry: Boolean!
  alertOnExit: Boolean!
  dwellThresholdMinutes: Int
}

input GetGeofenceEventsQueryInput {
  from: DateTime!
  to: DateTime!
  transporterId: UUID
  geofenceId: UUID
  openOnly: Boolean
  skip: Int
  take: Int
}

input GetGeofenceQueryInput {
  id: UUID!
}

input GetGeofencesByAccountQueryInput {
  enableCaching: Boolean!
  skip: Int
  take: Int
  type: Short
  active: Boolean
  search: String
}

input MultiPolygonVmInput {
  coordinates: [CoordinateVmInput!]!
  srid: Int!
}

input ProcessPositionsCommandInput {
  accountId: UUID!
  positions: [TransporterPositionDtoInput!]!
}

input TransporterPositionDtoInput {
  transporterId: UUID!
  latitude: Float!
  longitude: Float!
  deviceDateTime: DateTime!
}

input UpdateGeofenceCommandInput {
  geofence: GeofenceDtoInput!
}

"Defines when a policy shall be executed."
enum ApplyPolicy {
  "Before the resolver was executed."
  BEFORE_RESOLVER
  "After the resolver was executed."
  AFTER_RESOLVER
  "The policy is applied in the validation step before the execution."
  VALIDATION
}

"The `DateTime` scalar type represents a date and time with time zone offset information."
scalar DateTime
  @specifiedBy(url: "https://scalars.graphql.org/chillicream/date-time.html")

"The `Long` scalar type represents a signed 64-bit integer."
scalar Long
  @specifiedBy(url: "https://scalars.graphql.org/chillicream/long.html")

"The `Short` scalar type represents a signed 16-bit integer."
scalar Short
  @specifiedBy(url: "https://scalars.graphql.org/chillicream/short.html")

"The `UUID` scalar type represents a Universally Unique Identifier (UUID) as defined by RFC 9562."
scalar UUID
  @specifiedBy(url: "https://scalars.graphql.org/chillicream/uuid.html")

"The purpose of the `cost` directive is to define a `weight` for GraphQL types, fields, and arguments. Static analysis can use these weights when calculating the overall cost of a query or response."
directive @cost(
  "The `weight` argument defines what value to add to the overall cost for every appearance, or possible appearance, of a type, field, argument, etc."
  weight: String!
) on
  | SCALAR
  | OBJECT
  | FIELD_DEFINITION
  | ARGUMENT_DEFINITION
  | ENUM
  | INPUT_FIELD_DEFINITION
